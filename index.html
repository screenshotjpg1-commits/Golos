<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ-помощник для папы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a2f2a 0%, #05100e 100%);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(12, 30, 28, 0.55);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 48px 42px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #FFF8E7 0%, #C8F0E8 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub { color: #b5dfd4; margin-bottom: 40px; }
        .mic-btn {
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #FFDE91, #FFB845);
            border: none;
            border-radius: 50%;
            font-size: 3.5rem;
            cursor: pointer;
            margin-bottom: 32px;
        }
        .mic-btn:active { transform: scale(0.94); }
        .mic-btn.recording {
            background: linear-gradient(145deg, #FF8866, #FF4422);
            animation: pulse 1.3s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,80,40,0.5); }
            70% { box-shadow: 0 0 0 20px rgba(255,80,40,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,80,40,0); }
        }
        .status-badge {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 80px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            color: #d4f3ec;
        }
        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #3fe0a0;
        }
        .status-led.listening { background-color: #f5a623; animation: blink 0.9s infinite; }
        .status-led.thinking { background-color: #3b82f6; animation: pulseBlue 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulseBlue { 50% { transform: scale(1.4); } }
        .answer-card {
            background: rgba(8,25,22,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px;
            text-align: left;
            color: #f2f7f5;
            min-height: 150px;
            border: 1px solid rgba(255,215,150,0.2);
        }
        .loader-dots { display: inline-flex; gap: 4px; }
        .loader-dots span {
            width: 6px; height: 6px; background: #c0f5ea; border-radius: 50%;
            animation: wave 1.2s infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%,100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        footer { margin-top: 24px; font-size: 0.7rem; opacity: 0.55; color: #b0ddd2; }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>🎙️ Голосовой ИИ</h1>
    <div class="sub">Спроси о чём угодно</div>
    <button class="mic-btn" id="micButton">🎤</button>
    <div class="status-badge">
        <span class="status-led" id="statusLed"></span>
        <span id="statusText">Готов</span>
    </div>
    <div class="answer-card" id="answerCard">🌟 Нажми на микрофон и задай вопрос</div>
    <footer>🔐 Голосовой помощник с ИИ | Работает через нейросеть</footer>
</div>
<script>
    // Ключ подставляется через fetch к /api/config во время сборки
    let API_KEY = '';
    const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
    
    // Загружаем ключ с сервера (из GitHub Secrets)
    fetch('/api/config')
        .then(res => res.json())
        .then(data => { API_KEY = data.apiKey; })
        .catch(err => console.error('Ошибка загрузки ключа:', err));
    
    const micBtn = document.getElementById('micButton');
    const statusTextSpan = document.getElementById('statusText');
    const statusLed = document.getElementById('statusLed');
    const answerCard = document.getElementById('answerCard');

    function updateStatus(text, state) {
        statusTextSpan.innerText = text;
        statusLed.className = 'status-led';
        if (state === 'listening') statusLed.classList.add('listening');
        if (state === 'thinking') statusLed.classList.add('thinking');
    }

    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
    }

    function speakAnswer(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.92;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    async function askAI(question) {
        if (!API_KEY) return "⏳ Подождите 5 секунд, ключ загружается...";
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: 'google/gemini-2.0-flash-exp:free',
                    messages: [{ role: 'system', content: 'Ты — дружелюбный голосовой помощник для папы. Отвечай кратко.' }, { role: 'user', content: question }],
                    max_tokens: 500
                })
            });
            if (!response.ok) return `Ошибка API (${response.status})`;
            const data = await response.json();
            return data.choices[0].message.content;
        } catch(e) { return "Ошибка сети"; }
    }

    micBtn.addEventListener('click', () => {
        if (!recognition) { answerCard.innerHTML = "❌ Браузер не поддерживает голосовой ввод."; return; }
        if (!API_KEY) { answerCard.innerHTML = "⏳ Подождите, инициализация..."; return; }
        recognition.start();
        updateStatus('🎙️ Слушаю...', 'listening');
        micBtn.classList.add('recording');
        answerCard.innerHTML = "🔊 Слушаю...";
    });

    recognition.onresult = async (event) => {
        const userQuestion = event.results[0][0].transcript;
        updateStatus('🤔 Думаю...', 'thinking');
        micBtn.classList.remove('recording');
        answerCard.innerHTML = `🗣️ Вы: «${userQuestion}»<br><br><div class="loader-dots"><span></span><span></span><span></span></div>`;
        const aiReply = await askAI(userQuestion);
        updateStatus('✅ Готов', 'idle');
        answerCard.innerHTML = `🗣️ Вы: «${userQuestion}»<br><br>🤖 ${aiReply}`;
        speakAnswer(aiReply);
    };
    recognition.onerror = () => { updateStatus('⚠️ Ошибка', 'idle'); micBtn.classList.remove('recording'); };
    recognition.onend = () => { micBtn.classList.remove('recording'); if (statusTextSpan.innerText.includes('Слушаю')) updateStatus('Готов', 'idle'); };
</script>
</body>
</html>
