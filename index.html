<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ИИ-помощник | Голосовой ассистент для папы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(10, 30, 35, 1) 0%, rgba(3, 18, 22, 1) 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* анимированные фоновые блики */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle, rgba(80, 200, 180, 0.15) 0%, rgba(0,0,0,0) 70%);
            animation: rotateSlow 40s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glass-card {
            background: rgba(20, 40, 45, 0.45);
            backdrop-filter: blur(18px);
            border-radius: 72px;
            padding: 48px 40px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2;
        }

        .glass-card:hover {
            transform: scale(1.01);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFF5E6 0%, #D4F1F9 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #9fc7c0;
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px;
            border-bottom: 1px dashed rgba(255,255,200,0.3);
            display: inline-block;
            padding-bottom: 6px;
        }

        /* микрофон с пульсацией */
        .mic-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 32px;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: rgba(255, 200, 100, 0.3);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .mic-btn {
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #FFD966, #FFB347);
            border: none;
            border-radius: 50%;
            font-size: 3.5rem;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), 0 0 0 4px rgba(255,215,100,0.3);
            transition: all 0.2s ease;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d2b1f;
        }

        .mic-btn:active {
            transform: scale(0.94);
            background: linear-gradient(145deg, #FFB347, #FFA01E);
        }

        /* активное состояние записи */
        .mic-btn.recording {
            background: linear-gradient(145deg, #FF8866, #FF5533);
            box-shadow: 0 0 0 6px rgba(255, 80, 40, 0.5);
            animation: micPulse 1.2s infinite;
        }

        @keyframes micPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 80, 40, 0.6); }
            70% { box-shadow: 0 0 0 18px rgba(255, 80, 40, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 80, 40, 0); }
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #c0f0e4;
            border: 1px solid rgba(255,255,200,0.2);
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #6fcf97;
            box-shadow: 0 0 5px #2ecc71;
            transition: 0.2s;
        }

        .status-led.listening {
            background-color: #f39c12;
            box-shadow: 0 0 8px #f1c40f;
            animation: blink 1s infinite;
        }

        .status-led.thinking {
            background-color: #3498db;
            box-shadow: 0 0 8px #5dade2;
            animation: spinLed 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes spinLed {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); background-color: #5dade2; }
        }

        .answer-card {
            background: rgba(15, 35, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 28px;
            text-align: left;
            font-size: 1.05rem;
            line-height: 1.55;
            color: #f0f3ef;
            min-height: 160px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,210,0.15);
            transition: all 0.3s;
            overflow-y: auto;
            max-height: 280px;
            scrollbar-width: thin;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #88b8ae;
            text-align: center;
            letter-spacing: 0.3px;
            margin-top: 16px;
        }

        .loader-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }
        .loader-dots span {
            width: 6px;
            height: 6px;
            background: #a5f0e0;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.2s infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
            color: #88b8ae;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>🎙️ Голосовой помощник</h1>
    <div class="sub">Спроси голосом — отвечает ИИ</div>

    <div class="mic-wrapper">
        <div class="pulse-ring" id="pulseRing"></div>
        <button class="mic-btn" id="micButton">🎤</button>
    </div>

    <div class="status-badge" id="statusBadge">
        <span class="status-led" id="statusLed"></span>
        <span id="statusText">Готов к вопросу</span>
    </div>

    <div class="answer-card" id="answerCard">
        <span style="opacity:0.7;">✨ Нажми на микрофон и задай любой вопрос — погода, история, рецепты, шутки, переводы...</span>
    </div>

    <div class="hint-text">
        🧠 Искусственный интеллект отвечает на любые вопросы голосом и текстом. Просто нажми микрофон и говори.
    </div>
    <footer>🔐 Работает через нейросеть Gemini</footer>
</div>

<script>
    // ============================================================
    // API КЛЮЧ УЖЕ ВСТАВЛЕН! НИЧЕГО ВВОДИТЬ НЕ НУЖНО.
    // ============================================================
    const API_KEY = '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';
    const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
    
    // DOM элементы
    const micBtn = document.getElementById('micButton');
    const statusTextSpan = document.getElementById('statusText');
    const statusLed = document.getElementById('statusLed');
    const answerCard = document.getElementById('answerCard');
    const pulseRing = document.getElementById('pulseRing');

    function updateStatus(text, state) {
        statusTextSpan.innerText = text;
        statusLed.className = 'status-led';
        if(state === 'listening') {
            statusLed.classList.add('listening');
        } else if(state === 'thinking') {
            statusLed.classList.add('thinking');
        }
    }

    function animatePulse(active) {
        if(active) {
            pulseRing.style.animation = 'none';
            pulseRing.offsetHeight;
            pulseRing.style.animation = 'micPulse 1.2s infinite';
            micBtn.classList.add('recording');
        } else {
            pulseRing.style.animation = 'none';
            micBtn.classList.remove('recording');
        }
    }

    // распознавание речи
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false;
    }

    function speakAnswer(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.92;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    async function askAI(question) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'google/gemini-2.0-flash-exp:free',
                    messages: [
                        { role: 'system', content: 'Ты — дружелюбный голосовой помощник для папы. Отвечай кратко, по делу, тепло и понятно. Если спрашивают погоду — дай примерный прогноз. Всегда будь полезным.' },
                        { role: 'user', content: question }
                    ],
                    max_tokens: 550,
                    temperature: 0.7
                })
            });
            if (!response.ok) {
                const err = await response.json();
                console.error('API Error:', err);
                return `Ошибка API (${response.status}). Попробуй позже.`;
            }
            const data = await response.json();
            return data.choices[0].message.content;
        } catch(e) {
            console.error('Network error:', e);
            return "Ошибка сети. Проверь интернет и попробуй снова.";
        }
    }

    micBtn.addEventListener('click', () => {
        if (!recognition) {
            answerCard.innerHTML = "❌ Ваш браузер не поддерживает голосовой ввод. Используйте Chrome, Edge или Safari.";
            updateStatus('Голос не поддерживается', 'idle');
            return;
        }
        try {
            recognition.start();
            updateStatus('🎙️ Слушаю... скажите вопрос', 'listening');
            animatePulse(true);
            answerCard.innerHTML = "🔊 <span style='opacity:0.8;'>Слушаю ваш голос...</span>";
        } catch(e) {
            console.warn(e);
            updateStatus('Микрофон занят, попробуй ещё', 'idle');
            animatePulse(false);
        }
    });

    recognition.onresult = async (event) => {
        const userQuestion = event.results[0][0].transcript;
        updateStatus('🤔 Думаю, обращаюсь к ИИ...', 'thinking');
        animatePulse(false);
        answerCard.innerHTML = `🗣️ <strong>Вы спросили:</strong> «${userQuestion}»<br><br><div class="loader-dots"><span></span><span></span><span></span></div> <span style="opacity:0.7;">ИИ набирает ответ...</span>`;
        
        const aiReply = await askAI(userQuestion);
        
        updateStatus('✅ Ответ получен', 'idle');
        answerCard.innerHTML = `🗣️ <strong>Вы:</strong> «${userQuestion}»<br><br>🤖 <strong>Помощник:</strong> ${aiReply}`;
        speakAnswer(aiReply);
    };
    
    recognition.onerror = (event) => {
        console.error('Speech error:', event.error);
        updateStatus('⚠️ Ошибка микрофона, проверь разрешения', 'idle');
        animatePulse(false);
        answerCard.innerHTML = "❌ Не удалось распознать голос. Проверь микрофон и нажми снова.";
    };
    
    recognition.onend = () => {
        if (statusTextSpan.innerText.includes('Слушаю') || statusTextSpan.innerText.includes('Думаю')) {
            if(!statusTextSpan.innerText.includes('Ответ получен')) {
                updateStatus('Готов к вопросу', 'idle');
            }
        }
        animatePulse(false);
    };
</script>
</body>
</html>
