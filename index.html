<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой помощник для папы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0a1f1e 0%, #0c2a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 40px 32px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 2.5rem; margin-bottom: 16px; color: #f5e7d9; letter-spacing: -0.5px; }
        .sub { color: #b9e6d9; margin-bottom: 32px; font-size: 1.1rem; }
        .mic-btn {
            width: 120px;
            height: 120px;
            background: #ffd966;
            border: none;
            border-radius: 60px;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.2s;
            margin-bottom: 32px;
        }
        .mic-btn:active { transform: scale(0.95); background: #ffb347; }
        .status {
            background: #1e3a3a;
            padding: 12px 20px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 24px;
            font-weight: 600;
            color: #a5f0e0;
        }
        .answer {
            background: #0f2c2b;
            border-radius: 32px;
            padding: 24px;
            text-align: left;
            font-size: 1.2rem;
            line-height: 1.5;
            color: #f0f0f0;
            min-height: 120px;
        }
        .hint { margin-top: 24px; font-size: 0.85rem; color: #7faaa5; }
    </style>
</head>
<body>
<div class="card">
    <h1>🎙️ Слушаю, папа</h1>
    <div class="sub">Голосовой помощник · Скажи что угодно</div>
    <button class="mic-btn" id="micButton">🎤</button>
    <div class="status" id="status">⚪ Нажми микрофон</div>
    <div class="answer" id="answer">— Я здесь. Задай вопрос голосом.</div>
    <div class="hint">🔹 «Какая погода?» 🔹 «Расскажи шутку» 🔹 «Кто президент?» 🔹 «Сколько время?»</div>
</div>
<script>
    const micBtn = document.getElementById('micButton');
    const statusDiv = document.getElementById('status');
    const answerDiv = document.getElementById('answer');
    
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false;
    }
    
    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.95;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    
    function getAnswer(question) {
        const q = question.toLowerCase();
        if (q.includes('погод') || q.includes('дождь') || q.includes('солнце')) {
            return "Сейчас за окном +18, переменная облачность. Хорошая погода для прогулки.";
        }
        if (q.includes('время') || q.includes('часов') || q.includes('минут')) {
            const now = new Date();
            return `Точное время ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}.`;
        }
        if (q.includes('шутк') || q.includes('анекдот') || q.includes('смешн')) {
            return "Встречаются два программиста. Один говорит: «У меня жена — робот». Второй: «А у меня — человек, но тоже с багами». Ха-ха!";
        }
        if (q.includes('президент') || q.includes('путин')) {
            return "Президент России — Владимир Владимирович Путин.";
        }
        if (q.includes('как дела') || q.includes('как ты')) {
            return "У меня всё отлично, папа. Жду твоих новых команд!";
        }
        if (q.includes('спасибо')) {
            return "Пожалуйста! Всегда рад помочь.";
        }
        return "Интересный вопрос! Я пока учусь, но обязательно найду ответ. Попробуй спросить про погоду, время или шутку.";
    }
    
    micBtn.addEventListener('click', () => {
        if (!recognition) {
            answerDiv.innerHTML = "❌ Ваш браузер не поддерживает голосовой ввод. Попробуйте Chrome, Edge или Safari.";
            statusDiv.innerHTML = "❌ Не поддерживается";
            return;
        }
        recognition.start();
        statusDiv.innerHTML = "🎙️ Слушаю... говорите";
        answerDiv.innerHTML = "🔊 Слушаю...";
    });
    
    recognition.onresult = (event) => {
        const userText = event.results[0][0].transcript;
        statusDiv.innerHTML = "✅ Распознано: " + userText;
        const reply = getAnswer(userText);
        answerDiv.innerHTML = `🗣️ Вы: «${userText}»<br><br>🤖 Ответ: ${reply}`;
        speak(reply);
    };
    
    recognition.onerror = (event) => {
        statusDiv.innerHTML = "⚠️ Ошибка микрофона. Попробуй ещё раз.";
        answerDiv.innerHTML = "Не расслышал... Нажми микрофон и скажи чётче.";
    };
    
    recognition.onend = () => {
        if (statusDiv.innerHTML.includes("Слушаю")) {
            statusDiv.innerHTML = "⚪ Готов. Нажми микрофон.";
        }
    };
</script>
</body>
</html>
